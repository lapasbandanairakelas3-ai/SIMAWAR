<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tidak Ada Koneksi — SIMAWAR</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#1e3a8a"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1e3a8a 0%,#1e40af 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:white;-webkit-font-smoothing:antialiased}
    .container{max-width:440px;width:100%;text-align:center}
    .icon-wrap{width:120px;height:120px;margin:0 auto 24px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
    .icon-wrap svg{width:60px;height:60px}
    .icon-wrap::before{content:'';position:absolute;inset:-8px;border:2px solid rgba(255,255,255,.18);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:.2}}
    h1{font-size:28px;font-weight:800;margin-bottom:10px;letter-spacing:-.3px}
    p{font-size:14px;opacity:.85;line-height:1.6;margin-bottom:28px}
    .status{display:inline-flex;align-items:center;gap:8px;background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.4);padding:7px 14px;border-radius:30px;font-size:12px;font-weight:700;margin-bottom:24px}
    .status .dot{width:8px;height:8px;background:#ef4444;border-radius:50%;animation:blink 1.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .actions{display:flex;flex-direction:column;gap:10px}
    .btn{padding:14px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary{background:white;color:#1e3a8a}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
    .btn-secondary{background:rgba(255,255,255,.12);color:white;border:1px solid rgba(255,255,255,.2)}
    .btn-secondary:hover{background:rgba(255,255,255,.18)}
    .help{margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.15);font-size:12px;opacity:.75;line-height:1.7}
    .help strong{color:white;opacity:1}
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414"/>
      </svg>
    </div>
    <div class="status"><span class="dot"></span><span>Tidak Ada Koneksi</span></div>
    <h1>Anda Sedang Offline</h1>
    <p>Periksa koneksi internet Anda. Beberapa fitur tidak akan berfungsi sampai jaringan tersedia kembali.</p>
    <div class="actions">
      <button class="btn btn-primary" onclick="location.reload()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
        Coba Lagi
      </button>
      <a href="/" class="btn btn-secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
        Kembali ke Beranda
      </a>
    </div>
    <div class="help">
      <strong>Tips:</strong><br/>
      • Periksa Wi-Fi atau data seluler Anda<br/>
      • Mode pesawat mungkin aktif<br/>
      • Coba lagi dalam beberapa saat
    </div>
  </div>
  <script>
    // Auto reload saat online kembali
    window.addEventListener('online', () => {
      setTimeout(() => location.reload(), 800);
    });
  </script>
</body>
</html>
