<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Masuk — SIMAWAR</title>
  <link rel="icon" id="faviconEl" href="data:,"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    @keyframes swpulse{0%,100%{opacity:1}50%{opacity:.5}}
    @keyframes sbar{to{width:100%}}
  </style>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#1e3a8a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SIMAWAR"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
</head>
<body>

<!-- SPLASH — skeleton, tanpa data dummy -->
<div id="splashScreen" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#1e3a8a,#2563eb);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s">
  <!-- Logo: skeleton dulu, ganti dengan logo asli setelah load -->
  <div id="splashLogoWrap" style="width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:18px;overflow:hidden;animation:swpulse 1.5s infinite">
  </div>
  <!-- Nama: skeleton -->
  <div id="splashNameWrap" style="height:24px;width:160px;background:rgba(255,255,255,0.15);border-radius:8px;margin-bottom:6px;animation:swpulse 1.5s infinite"></div>
  <div id="splashDescWrap" style="height:14px;width:200px;background:rgba(255,255,255,0.1);border-radius:6px;animation:swpulse 1.5s infinite"></div>
  <!-- Progress bar -->
  <div style="margin-top:32px;width:130px;height:3px;background:rgba(255,255,255,0.15);border-radius:100px;overflow:hidden">
    <div style="height:100%;background:rgba(255,255,255,0.8);animation:sbar 0.9s ease forwards;width:0%"></div>
  </div>
</div>

<div id="loginPage" class="login-page" style="display:none">
  <div class="login-card fade-in">
    <!-- Logo: skeleton dulu -->
    <div class="login-logo" id="loginLogo" style="background:#f1f5f9;animation:swpulse 1.5s infinite">
      <span id="loginLogoPlaceholder" style="font-size:32px;display:none">🏛️</span>
    </div>
    <div id="loginSiteNameWrap" style="height:20px;background:#f1f5f9;border-radius:8px;width:60%;margin:0 auto 6px;animation:swpulse 1.5s infinite"></div>
    <div id="loginSiteDescWrap" style="height:14px;background:#f1f5f9;border-radius:6px;width:80%;margin:0 auto 24px;animation:swpulse 1.5s infinite"></div>
    <h1 class="text-center font-extrabold text-gray-900 text-xl mb-1" id="loginSiteName" style="display:none">SIMAWAR</h1>
    <p class="text-center text-sm text-gray-400 mb-7" id="loginSiteDesc" style="display:none">Sistem Informasi Monitoring Warga Binaan</p>

    <div class="form-group">
      <label class="form-label">Username</label>
      <div style="position:relative">
        <input type="text" id="fUsername" class="form-control" placeholder="Masukkan username" style="padding-right:40px" autocomplete="username"/>
        <svg style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#94a3b8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0"/></svg>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div style="position:relative">
        <input type="password" id="fPassword" class="form-control" placeholder="Masukkan password" style="padding-right:40px" autocomplete="current-password"/>
        <button type="button" onclick="togglePwd('fPassword',this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#94a3b8">
          <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </button>
      </div>
    </div>

    <button id="btnLogin" class="btn btn-primary w-full justify-center mt-1" style="padding:12px 20px;font-size:14px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/></svg>
      <span id="btnLoginText">Masuk</span>
    </button>
    <p style="text-align:center;font-size:12px;color:#64748b;margin-top:14px"><a href="#" onclick="openLupaPwd();return false;" style="color:#1d4ed8;font-weight:600;text-decoration:none">Lupa Password?</a></p>
  </div>

  <div class="app-footer" style="position:fixed;bottom:0;left:0;right:0;background:transparent;border:none;padding:14px">
    <span style="color:rgba(255,255,255,0.6)">Dibuat dengan ❤️ Oleh</span>
    <strong style="color:white">WA MIRANTI</strong>
    <a href="https://instagram.com/wa_miranti" target="_blank" class="social-link ig-link" title="Instagram @wa_miranti"><svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
    <a href="https://tiktok.com/@wa_miranti" target="_blank" class="social-link tt-link" title="TikTok @wa_miranti"><svg viewBox="0 0 24 24" fill="currentColor" style="width:14px;height:14px"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V9.15a8.16 8.16 0 004.77 1.52V7.22a4.85 4.85 0 01-1-.53z"/></svg></a>
  </div>
</div>

<script src="js/pwa.js"></script>
<script src="js/config.js"></script>
<script>
function togglePwd(id, btn) {
  const f = document.getElementById(id);
  f.type = f.type==='password' ? 'text' : 'password';
}

async function loadCfg() {
  try {
    const { data } = await sb.from('site_config').select('*').maybeSingle();
    if (!data) { showLoginFallback(); return; }

    // Update splash: ganti skeleton dengan konten asli
    const splashLogo = document.getElementById('splashLogoWrap');
    splashLogo.style.animation = 'none';
    if (data.logo_url) {
      const img = document.createElement('img');
      img.src = data.logo_url;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover';
      splashLogo.appendChild(img);
    } else {
      splashLogo.textContent = '🏛️';
      splashLogo.style.fontSize = '32px';
    }
    const sn = document.getElementById('splashNameWrap');
    sn.style.cssText = 'color:white;font-size:20px;font-weight:800;background:none;animation:none;height:auto;width:auto;border-radius:0;margin-bottom:6px';
    sn.textContent = data.site_name || 'SIMAWAR';
    const sd = document.getElementById('splashDescWrap');
    sd.style.cssText = 'color:rgba(255,255,255,0.7);font-size:12px;background:none;animation:none;height:auto;width:auto;border-radius:0;text-align:center';
    sd.textContent = data.site_desc?.split('\n')[0] || 'Sistem Informasi Monitoring Warga Binaan';

    // Update login card: hapus skeleton, tampilkan konten
    const loginLogo = document.getElementById('loginLogo');
    loginLogo.style.animation = 'none'; loginLogo.style.background = 'linear-gradient(135deg,#3b82f6,#1e40af)';
    if (data.logo_url) {
      const img = document.createElement('img'); img.src = data.logo_url; img.alt='Logo';
      loginLogo.appendChild(img);
    } else {
      document.getElementById('loginLogoPlaceholder').style.display = 'block';
    }
    document.getElementById('loginSiteNameWrap').style.display='none';
    document.getElementById('loginSiteDescWrap').style.display='none';
    const sname = document.getElementById('loginSiteName');
    sname.textContent = data.site_name || 'SIMAWAR'; sname.style.display='block';
    const sdesc = document.getElementById('loginSiteDesc');
    sdesc.textContent = data.site_desc || 'Sistem Informasi Monitoring Warga Binaan'; sdesc.style.display='block';
    document.title = `Masuk — ${data.site_name||'SIMAWAR'}`;
    if (data.favicon_url) document.getElementById('faviconEl').href = data.favicon_url;
  } catch(e) { showLoginFallback(); }
}

function showLoginFallback() {
  document.getElementById('splashLogoWrap').textContent='🏛️'; document.getElementById('splashLogoWrap').style.fontSize='32px'; document.getElementById('splashLogoWrap').style.animation='none';
  document.getElementById('splashNameWrap').style.cssText='color:white;font-size:20px;font-weight:800;background:none;animation:none;height:auto;width:auto;border-radius:0'; document.getElementById('splashNameWrap').textContent='SIMAWAR';
  document.getElementById('splashDescWrap').style.cssText='color:rgba(255,255,255,0.7);font-size:12px;background:none;animation:none;height:auto;width:auto;border-radius:0;text-align:center'; document.getElementById('splashDescWrap').textContent='Sistem Informasi Monitoring Warga Binaan';
  document.getElementById('loginSiteNameWrap').style.display='none'; document.getElementById('loginSiteDescWrap').style.display='none';
  document.getElementById('loginLogoPlaceholder').style.display='block'; document.getElementById('loginLogo').style.animation='none'; document.getElementById('loginLogo').style.background='linear-gradient(135deg,#3b82f6,#1e40af)';
  document.getElementById('loginSiteName').style.display='block'; document.getElementById('loginSiteDesc').style.display='block';
}

document.getElementById('fUsername').onkeydown = e => { if(e.key==='Enter') document.getElementById('fPassword').focus(); };
document.getElementById('fPassword').onkeydown = e => { if(e.key==='Enter') doLogin(); };
document.getElementById('btnLogin').onclick = doLogin;

async function doLogin() {
  const username = (document.getElementById('fUsername').value||'').trim();
  const password = (document.getElementById('fPassword').value||'');
  const btn=document.getElementById('btnLogin'), btnTxt=document.getElementById('btnLoginText');
  if(!username){showAlert('warning','Perhatian','Username wajib diisi!');return;}
  if(!password){showAlert('warning','Perhatian','Password wajib diisi!');return;}
  btn.disabled=true; btnTxt.textContent='Memverifikasi...';
  try {
    const {data:pg,error:pe}=await sb.from('pegawai').select('id,user_id,nama,username,password_plain,is_admin').eq('username',username).maybeSingle();
    if(pe||!pg){showAlert('error','Login Gagal','Username tidak ditemukan!');btn.disabled=false;btnTxt.textContent='Masuk';return;}
    if(password!==pg.password_plain){showAlert('error','Login Gagal','Password salah!');btn.disabled=false;btnTxt.textContent='Masuk';return;}
    sessionStorage.setItem('sw_id',pg.id);
    sessionStorage.setItem('sw_nama',pg.nama);
    sessionStorage.setItem('sw_username',pg.username);
    sessionStorage.setItem('sw_admin',pg.is_admin?'1':'0');
    // Buat sesi Supabase Auth di background
    const emailDummy=`${username.replace(/\s+/g,'')}@simawar.internal`;
    try {
      if(pg.user_id){await sb.auth.signInWithPassword({email:emailDummy,password});}
      else{const{data:au,error:ae}=await sb.auth.signUp({email:emailDummy,password});if(!ae&&au?.user){await sb.from('pegawai').update({user_id:au.user.id}).eq('id',pg.id);await sb.auth.signInWithPassword({email:emailDummy,password});}else if(ae?.message?.includes('registered')){await sb.auth.signInWithPassword({email:emailDummy,password});}}
    }catch(e){}
    showAlert('success','Berhasil!',`Selamat datang, ${pg.nama}!`);
    setTimeout(()=>{ location.href=pg.is_admin?'admin.html':'user.html'; },700);
  } catch(e) {
    showAlert('error','Error','Terjadi kesalahan. Coba lagi!');
    btn.disabled=false; btnTxt.textContent='Masuk';
  }
}

async function init() {
  // Load config (non-blocking, update splash/login setelah selesai)
  loadCfg().catch(()=>showLoginFallback());
  // Splash 1000ms lalu tampilkan login
  setTimeout(()=>{
    const s=document.getElementById('splashScreen');
    s.style.opacity='0';
    setTimeout(()=>{ s.style.display='none'; document.getElementById('loginPage').style.display='flex'; },500);
  },1000);
  // Redirect jika sudah login
  try {
    const swId=sessionStorage.getItem('sw_id'), swAdmin=sessionStorage.getItem('sw_admin');
    if(swId){ location.href=swAdmin==='1'?'admin.html':'user.html'; return; }
  } catch(e){}
}

// ── LUPA PASSWORD (admin only) ────────────────────────────────
function openLupaPwd(){
  document.getElementById('lupaPwdModal').style.display='flex';
  document.getElementById('lupaEmail').value='';
  document.getElementById('lupaResult').innerHTML='';
}
function closeLupaPwd(){ document.getElementById('lupaPwdModal').style.display='none'; }
async function submitLupaPwd(){
  const email=(document.getElementById('lupaEmail').value||'').trim().toLowerCase();
  const result=document.getElementById('lupaResult');
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    result.innerHTML='<div style="background:#fef2f2;color:#dc2626;padding:10px 12px;border-radius:10px;font-size:12px;font-weight:600;margin-top:10px">Format email tidak valid.</div>';
    return;
  }
  const btn=document.getElementById('btnLupaSubmit');
  btn.disabled=true; btn.textContent='Memeriksa...';
  try{
    // Cari admin dengan email tersebut
    const {data,error}=await sb.from('pegawai').select('id,nama,username,password_plain').eq('email',email).eq('is_admin',true).maybeSingle();
    if(error||!data){
      result.innerHTML='<div style="background:#fef2f2;color:#dc2626;padding:10px 12px;border-radius:10px;font-size:12px;font-weight:600;margin-top:10px">❌ Email tidak terdaftar sebagai admin.</div>';
      return;
    }
    // Tampilkan kredensial (untuk lapas, ini lebih praktis daripada SMTP)
    result.innerHTML=`<div style="background:#f0fdf4;border:1px solid #86efac;padding:14px;border-radius:12px;margin-top:12px">
      <div style="font-size:13px;font-weight:700;color:#065f46;margin-bottom:8px">✅ Akun Ditemukan</div>
      <div style="font-size:12px;color:#166534;line-height:1.7">
        <div><strong>Nama:</strong> ${data.nama}</div>
        <div><strong>Username:</strong> <code style="background:#d1fae5;padding:2px 6px;border-radius:4px">${data.username}</code></div>
        <div style="margin-top:6px"><strong>Password:</strong> <code style="background:#fef9c3;padding:2px 6px;border-radius:4px;color:#92400e">${data.password_plain||'—'}</code></div>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-top:10px;padding-top:10px;border-top:1px solid #bbf7d0">⚠️ Catat password ini lalu segera ganti setelah login.</div>
    </div>`;
  } finally {
    btn.disabled=false; btn.textContent='Cari Akun';
  }
}

init();
</script>

<!-- MODAL LUPA PASSWORD -->
<div id="lupaPwdModal" style="display:none;position:fixed;inset:0;z-index:10000;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)" onclick="if(event.target===this)closeLupaPwd()">
  <div style="background:white;border-radius:20px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:20px 20px 12px">
      <div>
        <div style="font-size:16px;font-weight:800;color:#1e293b">Lupa Password</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:2px">Khusus akun Admin</div>
      </div>
      <button onclick="closeLupaPwd()" style="background:#f1f5f9;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;color:#64748b;font-size:18px">✕</button>
    </div>
    <div style="padding:0 20px 20px">
      <p style="font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.6">Masukkan email yang terdaftar pada akun admin Anda. Sistem akan menampilkan kredensial Anda jika ditemukan.</p>
      <div style="margin-bottom:14px">
        <label style="font-size:12px;font-weight:700;color:#374151;margin-bottom:6px;display:block">Email Admin</label>
        <input type="email" id="lupaEmail" placeholder="admin@email.com" style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;outline:none" autocomplete="email"/>
      </div>
      <div id="lupaResult"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button onclick="closeLupaPwd()" style="padding:9px 18px;border:none;background:#f1f5f9;color:#64748b;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer">Batal</button>
        <button id="btnLupaSubmit" onclick="submitLupaPwd()" style="padding:9px 18px;border:none;background:linear-gradient(135deg,#3b82f6,#1e40af);color:white;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">Cari Akun</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
